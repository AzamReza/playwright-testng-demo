# src/test/resources/config/config.properties

# ========================================
# Application
# ========================================
base.url=https://www.saucedemo.com

# ========================================
# Browser
# ========================================
browser=chromium
headless=true
slow.motion=0
viewport.width=1920
viewport.height=1080

# ========================================
# Credentials
# ========================================
standard.username=standard_user
standard.password=secret_sauce
locked.username=locked_out_user
problem.username=problem_user
glitch.username=performance_glitch_user

# ========================================
# Timeouts (milliseconds)
# ========================================
default.timeout=10000
navigation.timeout=30000

# ========================================
# Reporting
# ========================================
screenshot.path=reports/screenshots/
screenshot.on.failure=true

# ========================================
# Logging
# ========================================
log.path=logs/automation.log